<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ascendant's Loom</title>
    <style>
        :root {
            --bg-color: #121212; --panel-bg: #1e1e1e; --text-main: #e0e0e0;
            --accent-gold: #d4af37; --accent-hover: #f1c40f; --border-color: #333;
            --danger-red: #c0392b; --heal-green: #27ae60; --event-purple: #8e44ad;
            --xp-blue: #2980b9; --mana-cyan: #00bcd4; --time-silver: #bdc3c7;
            --equip-green: #2ecc71; --combat-red: #8b0000; --sp-orange: #e67e22;
            --dungeon-teal: #1abc9c; --craft-bronze: #cd7f32; --ascend-white: #ffffff;
            --parry-silver: #bdc3c7;
        }

        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Georgia', serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        #sidebar { width: 320px; background-color: var(--panel-bg); border-right: 2px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }

        h1, h2, h3 { color: var(--accent-gold); margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1.05rem; }
        .stat-value { font-weight: bold; color: var(--accent-gold); }
        .hp-text { color: var(--danger-red); font-weight: bold; }
        .mana-text { color: var(--mana-cyan); font-weight: bold; }
        .sp-text { color: var(--sp-orange); font-weight: bold; }
        .faction-text { color: #fff; font-style: italic; }
        .time-text { color: var(--time-silver); font-size: 0.95rem; }
        .equip-text { color: var(--equip-green); font-size: 0.95rem;}

        .sys-btn-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .sys-btn { flex: 1; padding: 8px; background-color: #333; color: white; border: 1px solid var(--border-color); cursor: pointer; border-radius: 4px; font-family: 'Georgia', serif; transition: 0.2s; }
        .sys-btn:hover { background-color: var(--accent-gold); color: black; }

        #main-area { flex-grow: 1; display: flex; flex-direction: column; padding: 40px; max-width: 800px; margin: 0 auto; }
        #prose-container { flex-grow: 1; font-size: 1.25rem; line-height: 1.6; overflow-y: auto; margin-bottom: 20px; padding-right: 20px; }

        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #choices-container { display: flex; flex-direction: column; gap: 15px; overflow-y: auto; padding-bottom: 20px;}

        button.choice-btn {
            background-color: var(--panel-bg); color: var(--text-main); border: 1px solid var(--accent-gold);
            padding: 15px 20px; font-size: 1.1rem; font-family: 'Georgia', serif; text-align: left; cursor: pointer;
            transition: all 0.2s; border-radius: 4px;
        }

        button.choice-btn:hover { background-color: var(--accent-gold); color: var(--bg-color); transform: translateX(5px); }
        button.choice-btn:disabled { border-color: var(--border-color); color: #666; cursor: not-allowed; background-color: transparent; transform: none; }
        
        .req-text { font-size: 0.85rem; color: var(--danger-red); display: block; margin-top: 5px; }
        .req-mana { color: var(--mana-cyan); }
        .req-sp { color: var(--sp-orange); }

        .event-text { color: var(--event-purple); font-style: italic; }
        .death-text { color: var(--danger-red); font-weight: bold; font-size: 1.5rem;}
        .levelup-text { color: var(--accent-gold); font-weight: bold; font-size: 1.5rem;}
        .faction-join-text { color: var(--mana-cyan); font-weight: bold; }
        .location-text { color: var(--accent-hover); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; display: block; border-bottom: 1px dotted #555; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}
        .dungeon-text { color: var(--dungeon-teal); font-weight: bold; }
        .craft-text { color: var(--craft-bronze); font-weight: bold; }
        .ascend-text { color: var(--ascend-white); font-weight: bold; text-shadow: 0 0 10px var(--accent-gold); font-size: 1.3rem;}
        
        .combat-log-entry { margin-bottom: 10px; border-left: 3px solid var(--combat-red); padding-left: 10px; background-color: rgba(139, 0, 0, 0.1); padding: 10px; border-radius: 0 4px 4px 0;}
        .dmg-dealt { color: var(--heal-green); font-weight: bold;}
        .dmg-taken { color: var(--danger-red); font-weight: bold;}
        .enemy-header { background-color: var(--combat-red); color: white; padding: 10px; text-align: center; border-radius: 4px; margin-bottom: 15px; font-weight: bold; font-size: 1.2rem; letter-spacing: 1px;}
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>The Ascendant</h2>
        <div class="sys-btn-container">
            <button class="sys-btn" onclick="saveGame()">Save Game</button>
            <button class="sys-btn" onclick="loadGame()">Load Game</button>
        </div>
        <div class="stat-row"><span>Date:</span> <span id="stat-date" class="time-text"></span></div>
        <div class="stat-row"><span>Faction:</span> <span id="stat-faction" class="faction-text">Unbound</span></div>
        <div class="stat-row"><span>Level:</span> <span id="stat-level" class="stat-value">1</span></div>
        <div class="stat-row"><span>XP:</span> <span id="stat-xp" class="stat-value">0/10</span></div>
        <div class="stat-row"><span>SP:</span> <span id="stat-sp" class="sp-text">0</span></div>
        <div class="stat-row"><span>HP:</span> <span id="stat-hp" class="hp-text">10/10</span></div>
        <div class="stat-row"><span>Mana:</span> <span id="stat-mana" class="mana-text">10/10</span></div>
        <br>
        <h3>Equipment</h3>
        <div class="stat-row"><span>Weapon:</span> <span id="equip-weapon" class="equip-text">None</span></div>
        <div class="stat-row"><span>Armor:</span> <span id="equip-armor" class="equip-text">Rags</span></div>
        <div class="stat-row"><span>Accessory:</span> <span id="equip-accessory" class="equip-text">None</span></div>
        <br>
        <h3>Attributes</h3>
        <div class="stat-row"><span>Vigor:</span> <span id="stat-vigor" class="stat-value">1</span></div>
        <div class="stat-row"><span>Clarity:</span> <span id="stat-clarity" class="stat-value">1</span></div>
        <div class="stat-row"><span>Resonance:</span> <span id="stat-resonance" class="stat-value">0</span></div>
        <div class="stat-row"><span>Agility:</span> <span id="stat-agility" class="stat-value">1</span></div>
        <div class="stat-row"><span>Fortune:</span> <span id="stat-fortune" class="stat-value">1</span></div>
        <br>
        <h3>Inventory</h3>
        <div class="stat-row"><span>Wealth:</span> <span id="stat-wealth" class="stat-value">0</span> cp</div>
        <div id="inventory-list" style="color: #aaa; font-size: 0.9rem;">Empty</div>
        <br>
        <h3>Skills & Traits</h3>
        <div id="skills-list" style="color: #aaa; font-style: italic;">Ignorant (Trait)</div>
    </div>

    <div id="main-area">
        <div id="prose-container" class="fade-in"></div>
        <div id="choices-container"></div>
    </div>

    <script>
        // --- GAME STATE ---
        let player = {
            name: "Ascendant", faction: "Unbound", level: 1, xp: 0, xpReq: 10, sp: 0,
            hp: 10, maxHp: 10, mana: 10, maxMana: 10, wealth: 0, inventory: [], skills: ["Ignorant"], flags: [],
            stats: { vigor: 1, clarity: 1, resonance: 0, agility: 1, fortune: 1 },
            equipment: { weapon: "None", armor: "Rags", accessory: "None" },
            time: { year: 842, month: 3, day: 1 },
            combat: { active: false, enemy: null, log: [] },
            currentNode: "start" 
        };

        const monthNames = ["Frostfall", "Deepwinter", "Thaw", "Seed", "Rain", "Sun", "Highsun", "Reap", "Harvest", "Hearth", "Gloom", "Veil"];
        let postLevelUpTarget = ""; let eventRateModifier = 0; let previousHub = "village_square"; 
        let equipBonuses = { weapon: { stat: null, val: 0 }, armor: { stat: null, val: 0 }, accessory: { stat: null, val: 0 } };

        // --- ENEMY DATABASE ---
        const enemies = {
            "timber_wolf": { name: "Timber Wolf", hp: 8, maxHp: 8, atk: 2, xp: 12, stunned: 0, winTarget: "combat_victory_wolf" },
            "bandit": { name: "Desperate Bandit", hp: 10, maxHp: 10, atk: 2, xp: 10, stunned: 0, winTarget: "combat_victory_bandit" },
            "senior_disciple": { name: "Senior Disciple", hp: 35, maxHp: 35, atk: 6, xp: 30, stunned: 0, winTarget: "combat_victory_senior" },
            "crystal_hound": { name: "Crystal Hound", hp: 14, maxHp: 14, atk: 3, xp: 20, stunned: 0, winTarget: "dungeon_depths" },
            "fracture_sentinel": { name: "Fracture Sentinel (Boss)", hp: 50, maxHp: 50, atk: 8, xp: 60, stunned: 0, winTarget: "dungeon_victory" },
            "kaelen": { name: "Kaelen Vane (Rival)", hp: 38, maxHp: 38, atk: 6, xp: 50, stunned: 0, winTarget: "combat_victory_kaelen" },
            "academy_champion": { name: "Grand Champion", hp: 85, maxHp: 85, atk: 9, xp: 100, stunned: 0, winTarget: "combat_victory_champion" }
        };

        // --- STORY DATA ---
        const story = {
            "start": {
                text: "<span class='location-text'>Location: Oakhaven Estate Fields</span>You are an 'Unbound'—a mortal born without the internal magic to manipulate the threads of reality. For sixteen years, you have lived as property of the noble House Vane.<br><br>The gray morning sky is oppressive. The local overseer cracks a whip, barking your name. You have two choices: submit to another day of labor to slowly build your mortal strength, or risk the Whispering Woods to hunt for magical herbs.",
                choices: [
                    { text: "Submit to the grind. Work the fields. (Takes 1 Day, Builds physical Vigor)", target: "work_fields", effect: () => { modifyStat('vigor', 1); modifyWealth(2); addXp(2); advanceTime(1); } },
                    { text: "Sneak into the Whispering Woods. (Takes 1 Day, Relies on Agility/Fortune)", target: "hunt_woods", effect: () => { modifyStat('agility', 1); modifyStat('fortune', 1); addXp(3); advanceTime(1); } }
                ]
            },
            "work_fields": {
                text: "<span class='location-text'>Location: Oakhaven Fields</span>You harvest razor-stalk wheat until your hands bleed. The work is agonizing, but you can feel your muscles hardening.<br><br>As the sun sets, a gilded carriage rattles down the dirt road. Inside sits Kaelen of House Vane—the pampered heir. He looks down at you through the window, an arrogant, mocking smirk on his pristine face.",
                choices: [
                    { text: "Glare back at him. Swear vengeance. (+2 XP)", target: "village_square", effect: () => { addSkill("Rival: Kaelen"); addXp(2); setFlag("met_kaelen"); previousHub = "village_square"; } },
                    { text: "Keep your head down. Save your energy. (+2 XP)", target: "village_square", effect: () => { modifyStat('clarity', 1); addXp(2); previousHub = "village_square"; } }
                ]
            },
            "hunt_woods": {
                text: "<span class='location-text'>Location: The Whispering Woods</span>The woods are strictly off-limits to the Unbound. You use your small stature to slip past the estate guards.<br><br>Deep in a damp, rotting hollow, you spot a faint glow. It is a patch of luminescent Blue-Vein Moss.",
                choices: [
                    { text: "Eat the moss raw. Force an Awakening. (Lose 5 HP, Gain Resonance, +5 XP)", target: "eat_moss", effect: () => { modifyHp(-5); modifyStat('resonance', 2); removeSkill("Ignorant"); addSkill("Poison Resistance"); addXp(5); } },
                    { text: "Harvest it carefully to sell. (+2 XP)", target: "village_square", effect: () => { addItem("Blue-Vein Moss"); addXp(2); previousHub = "village_square"; } }
                ]
            },
            "eat_moss": {
                text: "You shove the glowing moss into your mouth. Instantly, pain rips through your veins like liquid fire. You collapse into the mud, gasping for air.<br><br>But as the agony subsides, the world looks different. You have survived the refinement. You have awakened your Resonance.",
                choices: [{ text: "Stumble back to the village square.", target: "village_square", effect: () => { previousHub = "village_square"; } }]
            },
            
            // --- MAIN HUB ---
            "village_square": {
                text: "<span class='location-text'>Location: Oakhaven Village Square</span>You stand in the muddy center of Oakhaven. A shimmering, jagged tear in reality—a 'Fracture'—has recently opened near the treeline. A dirt road stretches east toward the legendary Capital.",
                choices: [
                    { text: "Hunt beasts in the Whispering Woods (Combat)", target: "START_COMBAT_WOLF", effect: () => { advanceTime(1); } },
                    { text: "Approach the Ivory Consortium Merchant Tent.", target: "merchant_tent" },
                    { text: "Rest at the Boar & Barrel Inn (Cost: 2 cp. Heals 5 HP)", target: "rest_inn", req: { stat: "wealth", val: 2, type: "currency" } },
                    { text: "Meditate on your Core (Skill Tree).", target: "skill_tree_menu", effect: () => { previousHub = "village_square"; } },
                    { text: "Manage Inventory & Equipment.", target: "inventory_menu", effect: () => { previousHub = "village_square"; } },
                    { text: "<span class='dungeon-text'>Delve into the Whispering Fracture (Dungeon. Rec Level: 2+)</span>", target: "dungeon_entrance", effect: () => { previousHub = "village_square"; } },
                    { text: "Travel the road to the Capital. (Takes 5 Days)", target: "travel_road", effect: () => { advanceTime(5); eventRateModifier = 0.35; } }
                ]
            },
            "merchant_tent": {
                text: "Master Silas sits behind a desk inside a lavish silk tent.",
                choices: [
                    { text: "Sell the Blue-Vein Moss (Gain 50 cp)", target: "merchant_tent", req: { stat: "Blue-Vein Moss", val: 1, type: "item" }, effect: () => { consumeItem("Blue-Vein Moss"); modifyWealth(50); } },
                    { text: "Leave the tent.", target: "village_square" }
                ]
            },
            "rest_inn": {
                text: "You pay the innkeeper your hard-earned coppers. The stew is thin, but your mortal wounds knit slightly overnight.",
                choices: [{ text: "Wake up the next morning.", target: "village_square", effect: () => { advanceTime(1); modifyWealth(-2); modifyHp(5); modifyMana(5); } }]
            },

            // --- DUNGEON ---
            "dungeon_entrance": {
                text: "<span class='location-text dungeon-text'>Location: The Whispering Fracture</span>You step up to the rift. The air hums with raw, jagged Resonance. Time dilates heavily inside these localized anomalies; exploring this will cost you 5 Days of real-world time.",
                choices: [
                    { text: "Step into the Fracture. (Takes 5 Days)", target: "START_COMBAT_HOUND", effect: () => { advanceTime(5); } },
                    { text: "It's too dangerous. Turn back.", target: "village_square" }
                ]
            },
            "dungeon_depths": {
                text: "<span class='location-text dungeon-text'>Location: Fracture Depths</span>The Crystal Hound shatters, leaving behind a jagged <b>Resonance Crystal</b>. Before you lies a shimmering pool of liquid mana, and beyond that, a massive stone door vibrating with power.",
                choices: [
                    { text: "Drink from the pool before opening the door. (Restores Full HP/Mana)", target: "START_COMBAT_BOSS", effect: () => { addItem("Resonance Crystal"); player.hp = player.maxHp; player.mana = player.maxMana; } },
                    { text: "Ignore the pool and kick the door open.", target: "START_COMBAT_BOSS", effect: () => { addItem("Resonance Crystal"); } }
                ]
            },
            "dungeon_victory": {
                text: "<span class='location-text dungeon-text'>Location: Fracture Core - Cleared!</span>The towering Sentinel crumbles to dust. The rift begins to destabilize. On the pedestal behind the boss, you find a beautiful piece of jewelry pulsing with magic, alongside a shard of pure, crystallized destiny.",
                choices: [
                    { text: "Take the loot and escape! (Gain Resonance Amulet, Loom Fragment: Resonance)", target: "village_square", effect: () => { addItem("Resonance Amulet"); addItem("Loom Fragment: Resonance"); modifyWealth(50); setFlag("cleared_fracture"); } }
                ]
            },

            // --- CITY & SLUMS ---
            "travel_road": {
                text: "<span class='location-text'>Location: The Kingsroad</span>You walk the long dirt path. Finally, the massive white-stone walls of Aethelgard come into view.",
                choices: [{ text: "Approach the Capital Gates.", target: "capital_gates", effect: () => { eventRateModifier = 0; } } ]
            },
            "capital_gates": {
                text: "<span class='location-text'>Location: Aethelgard City Gates</span>Two armored guards carrying halberds glowing with runic arrays block the massive iron gate.<br><br>'Entry fee is 5 coppers, provincial,' one of them grunts.",
                choices: [
                    { text: "Pay the fee and enter the city. (Cost: 5 cp)", target: "capital_slums", req: { stat: "wealth", val: 5, type: "currency" }, effect: () => { modifyWealth(-5); previousHub = "capital_slums"; } },
                    { text: "Turn back and walk to Oakhaven. (Takes 5 days)", target: "village_square", effect: () => { advanceTime(5); eventRateModifier = 0.35; previousHub = "village_square"; } }
                ]
            },
            "capital_slums": {
                text: "<span class='location-text'>Location: Aethelgard Lower District</span>The slums are a claustrophobic maze of mud, smoke, and desperate ambition. To the north lie the grand gates of the Celestial Academy. To the east, the clanging of the Slag Forge rings out.",
                choices: [
                    { text: "<span class='ascend-text'>Climb the Golden Stairway (Ascension Ritual)</span>", target: "ascension_end", req: { type: "ascension" } },
                    { text: "Approach the Celestial Academy Gates.", target: "academy_gates" },
                    { text: "Visit the Black Market (Buy Equipment).", target: "black_market" },
                    { text: "<span class='craft-text'>Visit the Slag Forge (Crafting & Enchanting).</span>", target: "slag_forge" },
                    { text: "Investigate the unnaturally dark alleyway.", target: "dark_alley" },
                    { text: "Meditate on your Core (Skill Tree).", target: "skill_tree_menu", effect: () => { previousHub = "capital_slums"; } },
                    { text: "Manage Inventory & Equipment.", target: "inventory_menu", effect: () => { previousHub = "capital_slums"; } },
                    { text: "Travel to Oakhaven (Takes 5 Days).", target: "village_square", effect: () => { advanceTime(5); eventRateModifier = 0.35; } }
                ]
            },
            
            // --- ENDGAME ---
            "ascension_end": {
                text: "<span class='location-text ascend-text'>Location: The Core of the Loom</span>You step onto the ethereal golden stairway. The three Loom Fragments float around you like obedient stars. You have broken past the mortal bottleneck and reached the absolute zenith of physical power. As you climb, the Threads of Fate bow to your will. You are no longer Unbound. You are a god.<br><br><b>Congratulations. You have completed the Ascendant's Loom!</b>",
                choices: [
                    { text: "Sever your mortal thread. (End Game & Restart)", target: "start", effect: () => { localStorage.removeItem('ascendantsLoomSave'); location.reload(); } }
                ]
            },

            // --- CRAFTING ---
            "slag_forge": {
                text: "<span class='location-text craft-text'>Location: The Slag Forge</span>A grizzled half-orc hammers away at an anvil that crackles with chaotic magical sparks. 'I can fuse your basic mundane gear with cultivated materials.'",
                choices: [
                    { text: "Craft Rune-Etched Blade (Req: Iron Dagger, Resonance Crystal)", target: "slag_forge", req: { type: "craft", items: ["Iron Dagger", "Resonance Crystal"] }, effect: () => { consumeItem("Iron Dagger"); consumeItem("Resonance Crystal"); addItem("Rune-Etched Blade"); } },
                    { text: "Craft Hunter's Leather (Req: Traveler's Cloak, Wolf Pelt)", target: "slag_forge", req: { type: "craft", items: ["Traveler's Cloak", "Wolf Pelt"] }, effect: () => { consumeItem("Traveler's Cloak"); consumeItem("Wolf Pelt"); addItem("Hunter's Leather"); } },
                    { text: "Leave the Forge.", target: "capital_slums" }
                ]
            },

            // --- SILENT CHOIR ---
            "dark_alley": {
                text: "<span class='location-text'>Location: Smuggler's Alley</span>The shadows in this alleyway cling to the stone walls like thick cobwebs.",
                choices: [
                    { text: "[Spend 5 Mana] Channel Resonance to pierce the illusion.", target: "silent_choir_hideout", req: { stat: "resonance", val: 2, type: "stat" }, effect: () => modifyMana(-5) },
                    { text: "Leave the alleyway. It's too creepy.", target: "capital_slums" }
                ]
            },
            "silent_choir_hideout": {
                text: "<span class='location-text event-text'>Location: The Whisper Vault</span>The illusion of the dead-end shatters. An assassin in a faceless porcelain mask bows to you. 'The Silent Choir extends an invitation to a new blade.'",
                choices: [{ text: "Swear the Oath of Shadows.", target: "capital_slums", effect: () => { changeFaction("Silent Choir"); addSkill("Shadow Strike"); setFlag("joined_choir"); } }]
            },

            // --- BLACK MARKET ---
            "black_market": {
                text: "<span class='location-text'>Location: The Smuggler's Run</span>Desperate figures peddle stolen goods and blood-stained gear.",
                choices: [
                    { text: "Buy an Iron Dagger (Weapon. Cost: 30 cp)", target: "black_market", req: { stat: "wealth", val: 30, type: "currency" }, effect: () => { modifyWealth(-30); addItem("Iron Dagger"); } },
                    { text: "Buy a Traveler's Cloak (Armor. Cost: 20 cp)", target: "black_market", req: { stat: "wealth", val: 20, type: "currency" }, effect: () => { modifyWealth(-20); addItem("Traveler's Cloak"); } },
                    { text: "Buy an Iron Buckler (Accessory. Unlocks 'Block'. Cost: 25 cp)", target: "black_market", req: { stat: "wealth", val: 25, type: "currency" }, effect: () => { modifyWealth(-25); addItem("Iron Buckler"); } },
                    { text: "Return to the Slums.", target: "capital_slums" }
                ]
            },
            
            // --- MENUS ---
            "inventory_menu": {
                text: "<span class='location-text'>Inventory & Equipment</span>You take a moment to inspect your spatial storage and adjust your gear.",
                choices: [
                    { text: "Equip Iron Dagger (Weapon: +1 Vigor)", target: "inventory_menu", req: { stat: "Iron Dagger", val: 1, type: "item" }, effect: () => { equipItem("weapon", "Iron Dagger", "vigor", 1); } },
                    { text: "Equip Rune-Etched Blade (Weapon: +3 Vigor, +1 Res)", target: "inventory_menu", req: { stat: "Rune-Etched Blade", val: 1, type: "item" }, effect: () => { equipItem("weapon", "Rune-Etched Blade", "vigor", 3); player.stats.resonance += 1; recalculateDerived(); } },
                    { text: "Equip Traveler's Cloak (Armor: +1 Agility)", target: "inventory_menu", req: { stat: "Traveler's Cloak", val: 1, type: "item" }, effect: () => { equipItem("armor", "Traveler's Cloak", "agility", 1); } },
                    { text: "Equip Hunter's Leather (Armor: +2 Agility, +1 Vigor)", target: "inventory_menu", req: { stat: "Hunter's Leather", val: 1, type: "item" }, effect: () => { equipItem("armor", "Hunter's Leather", "agility", 2); player.stats.vigor += 1; recalculateDerived(); } },
                    { text: "Equip Iron Buckler (Accessory: +1 Vigor, Unlocks Block)", target: "inventory_menu", req: { stat: "Iron Buckler", val: 1, type: "item" }, effect: () => { equipItem("accessory", "Iron Buckler", "vigor", 1); } },
                    { text: "Equip Resonance Amulet (Accessory: +2 Resonance)", target: "inventory_menu", req: { stat: "Resonance Amulet", val: 1, type: "item" }, effect: () => { equipItem("accessory", "Resonance Amulet", "resonance", 2); } },
                    { text: "Equip Vane Signet Ring (Accessory: +1 Vigor, +1 Resonance)", target: "inventory_menu", req: { stat: "Vane Signet Ring", val: 1, type: "item" }, effect: () => { equipItem("accessory", "Vane Signet Ring", "vigor", 1); player.stats.resonance += 1; recalculateDerived(); } }, 
                    { text: "Finish Managing.", target: "RETURN_TO_HUB" }
                ]
            },

        // --- CORE LOGIC & SAVE SYSTEM ---
        let intendedTarget = ""; 

        function saveGame() { localStorage.setItem('ascendantsLoomSave', JSON.stringify(player)); alert("Game Saved Successfully!"); }
        function loadGame() {
            const savedData = localStorage.getItem('ascendantsLoomSave');
            if(savedData) {
                player = JSON.parse(savedData);
                equipBonuses = { weapon: { stat: null, val: 0 }, armor: { stat: null, val: 0 }, accessory: { stat: null, val: 0 } };
                updateUI(); renderNode(player.currentNode); alert("Game Loaded!");
            } else { alert("No save file found."); }
        }

        function advanceTime(days) {
            player.time.day += days;
            while (player.time.day > 30) { player.time.day -= 30; player.time.month += 1; if (player.time.month > 12) { player.time.month -= 12; player.time.year += 1; } }
        }

        function updateUI() {
            document.getElementById('stat-date').innerText = `Day ${player.time.day}, ${monthNames[player.time.month - 1]}, Yr ${player.time.year}`;
            document.getElementById('stat-faction').innerText = player.faction;
            document.getElementById('stat-level').innerText = player.level === 10 ? "10 (MAX)" : player.level;
            document.getElementById('stat-xp').innerText = player.level === 10 ? "MAX" : `${player.xp}/${player.xpReq}`;
            document.getElementById('stat-sp').innerText = player.sp;
            document.getElementById('stat-hp').innerText = `${player.hp}/${player.maxHp}`;
            document.getElementById('stat-mana').innerText = `${player.mana}/${player.maxMana}`;
            document.getElementById('equip-weapon').innerText = player.equipment.weapon;
            document.getElementById('equip-armor').innerText = player.equipment.armor;
            document.getElementById('equip-accessory').innerText = player.equipment.accessory;
            document.getElementById('stat-vigor').innerText = player.stats.vigor;
            document.getElementById('stat-clarity').innerText = player.stats.clarity;
            document.getElementById('stat-resonance').innerText = player.stats.resonance;
            document.getElementById('stat-agility').innerText = player.stats.agility;
            document.getElementById('stat-fortune').innerText = player.stats.fortune;
            document.getElementById('stat-wealth').innerText = player.wealth;
            document.getElementById('inventory-list').innerHTML = player.inventory.length > 0 ? player.inventory.join("<br>") : "Empty";
            document.getElementById('skills-list').innerHTML = player.skills.join("<br>");
        }

        function modifyBaseStat(stat, amount) { player.stats[stat] += amount; recalculateDerived(); }
        function modifyStat(stat, amount) { player.stats[stat] += amount; recalculateDerived(); }
        function recalculateDerived() { player.maxHp = player.stats.vigor * 10; player.maxMana = player.stats.clarity * 10; }
        
        function equipItem(slot, itemName, buffStat, buffVal) {
            if (player.equipment.accessory === "Vane Signet Ring" && slot === "accessory") { player.stats.vigor -= 1; player.stats.resonance -= 1; } 
            else if (player.equipment.weapon === "Rune-Etched Blade" && slot === "weapon") { player.stats.vigor -= 3; player.stats.resonance -= 1; }
            else if (player.equipment.armor === "Hunter's Leather" && slot === "armor") { player.stats.agility -= 2; player.stats.vigor -= 1; }
            else if (equipBonuses[slot].stat !== null) { player.stats[equipBonuses[slot].stat] -= equipBonuses[slot].val; }

            player.equipment[slot] = itemName; 
            if (itemName === "Vane Signet Ring" || itemName === "Rune-Etched Blade" || itemName === "Hunter's Leather") { equipBonuses[slot] = { stat: null, val: 0 }; } 
            else if (buffStat !== null) { equipBonuses[slot] = { stat: buffStat, val: buffVal }; player.stats[buffStat] += buffVal; } 
            else { equipBonuses[slot] = { stat: null, val: 0 }; }
            recalculateDerived();
        }

        function consumeItem(itemName) {
            const index = player.inventory.indexOf(itemName); if (index > -1) player.inventory.splice(index, 1);
            if(player.equipment.weapon === itemName) equipItem("weapon", "None", null, 0);
            if(player.equipment.armor === itemName) equipItem("armor", "Rags", null, 0);
            if(player.equipment.accessory === itemName) equipItem("accessory", "None", null, 0);
        }

        function modifyHp(amount) { player.hp += amount; if (player.hp > player.maxHp) player.hp = player.maxHp; }
        function modifyMana(amount) { player.mana += amount; if (player.mana > player.maxMana) player.mana = player.maxMana; if (player.mana < 0) player.mana = 0; }
        function modifyWealth(amount) { player.wealth += amount; }
        function addXp(amount) { if (player.level < 10) player.xp += amount; }
        function addItem(item) { if(!player.inventory.includes(item)) player.inventory.push(item); }
        function changeFaction(newFaction) { player.faction = newFaction; }
        function setFlag(flag) { if (!player.flags.includes(flag)) player.flags.push(flag); }
        function addSkill(skill) { if (!player.skills.includes(skill)) player.skills.push(skill); }
        function removeSkill(skill) { player.skills = player.skills.filter(s => s !== skill); }

        function finishLevelUp() { 
            player.level += 1; player.sp += 1; player.xp -= player.xpReq; player.xpReq = Math.floor(player.xpReq * 1.4); 
            player.hp = player.maxHp; player.mana = player.maxMana; 
        }

        // --- RNG DAMAGE CALCULATOR ---
        function rollDamage(baseVal) {
            let variance = Math.max(1, Math.floor(baseVal * 0.25)); 
            let min = baseVal - variance; let max = baseVal + variance;
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        // --- COMBAT ENGINE ---
        function initCombat(enemyId) {
            player.combat.active = true; player.combat.enemy = JSON.parse(JSON.stringify(enemies[enemyId]));
            player.combat.log = [`<span class='event-text'>Combat initiated against ${player.combat.enemy.name}!</span>`];
            player.currentNode = "START_COMBAT_" + enemyId.toUpperCase();
            renderCombat();
        }

        function executeCombatRound(actionType) {
            let logEntry = ""; let pDmg = 0; 
            
            // Stun Check (Pre-Enemy Turn)
            let enemyStunnedThisTurn = false;
            if (player.combat.enemy.stunned > 0) {
                enemyStunnedThisTurn = true;
                player.combat.enemy.stunned--;
            }

            let enemyBaseAtk = player.combat.enemy.atk;
            let enemyDmg = enemyStunnedThisTurn ? 0 : rollDamage(enemyBaseAtk);
            let wpnBonus = 0; if(player.equipment.weapon === "Iron Dagger") wpnBonus = 3; if(player.equipment.weapon === "Rune-Etched Blade") wpnBonus = 6;

            // Insight Check (Passive)
            if (Math.random() * 100 < (player.stats.clarity * 5)) {
                let bonusXp = Math.floor(Math.random() * 3) + 1; addXp(bonusXp);
                logEntry += `<span style='color:var(--mana-cyan); font-weight:bold;'>[Sudden Insight!]</span> You understand the flow of battle better. Gained ${bonusXp} XP!<br>`;
            }

            // Player Actions
            if (actionType === 'strike') {
                let base = Math.floor(player.stats.vigor * 1.5) + wpnBonus; pDmg = Math.max(1, rollDamage(base));
                if (Math.random() * 100 < (player.stats.fortune * 5 + player.stats.agility * 2)) {
                    pDmg *= 2; logEntry += `You strike with <span style='color:var(--accent-hover); font-weight:bold;'>CRITICAL</span> force! Dealt <span class='dmg-dealt'>${pDmg} dmg</span>. `;
                } else { logEntry += `You strike! Dealt <span class='dmg-dealt'>${pDmg} dmg</span>. `; }
                player.combat.enemy.hp -= pDmg;
            } else if (actionType === 'magic') {
                modifyMana(-3); let base = (player.stats.resonance * 3) + 2; pDmg = Math.max(1, rollDamage(base));
                if (Math.random() * 100 < (player.stats.fortune * 5 + player.stats.clarity * 2)) {
                    pDmg *= 2; logEntry += `You channel Resonance into a <span style='color:var(--mana-cyan); font-weight:bold;'>CRITICAL</span> blast! Dealt <span class='dmg-dealt'>${pDmg} dmg</span>. `;
                } else { logEntry += `You channel Resonance! Blasted for <span class='dmg-dealt'>${pDmg} dmg</span>. `; }
                player.combat.enemy.hp -= pDmg;
            } else if (actionType === 'evade') {
                let dodgeChance = (player.stats.agility * 15) + 40; 
                if (Math.random() * 100 < dodgeChance) { enemyDmg = 0; logEntry += `You swiftly evade the attack! `; } 
                else { enemyDmg = Math.max(1, enemyDmg - Math.floor(player.stats.agility / 2) - 1); logEntry += `You try to dodge but get clipped. `; }
            } else if (actionType === 'block') {
                let blockAmount = (player.stats.vigor * 2) + 2;
                enemyDmg = Math.max(0, enemyDmg - blockAmount);
                logEntry += `You raise your buckler and brace! Blocked up to ${blockAmount} damage. `;
            } else if (actionType === 'parry') {
                let parryChance = (player.stats.agility * 10) + (player.stats.fortune * 5);
                if (Math.random() * 100 < parryChance) {
                    enemyDmg = 0; player.combat.enemy.stunned = 1;
                    logEntry += `<span style='color:var(--equip-green); font-weight:bold;'>PARRY SUCCESSFUL!</span> You deflect the blow perfectly, throwing the enemy off balance! `;
                } else {
                    enemyDmg = Math.floor(enemyDmg * 1.5);
                    logEntry += `<span style='color:var(--danger-red); font-weight:bold;'>PARRY FAILED!</span> You mistimed your block and left yourself wide open! `;
                }
            } else if (actionType === 'reckless_counter') {
                let base = Math.floor(player.stats.vigor * 2.5) + wpnBonus; pDmg = Math.max(1, rollDamage(base));
                logEntry += `You drop your guard completely to trade blows! Dealt a massive <span class='dmg-dealt'>${pDmg} dmg</span>! `;
                player.combat.enemy.hp -= pDmg;
                if (!enemyStunnedThisTurn) enemyDmg = Math.floor(enemyDmg * 1.5); // Take extra dmg
            } else if (actionType === 'staggering_blow') {
                modifyHp(-1); pDmg = Math.max(1, Math.floor(player.stats.vigor * 0.5));
                player.combat.enemy.stunned = 1;
                logEntry += `You deliver a jarring pommel strike! Dealt <span class='dmg-dealt'>${pDmg} dmg</span> and <span style='color:var(--equip-green); font-weight:bold;'>STUNNED</span> the enemy! `;
                player.combat.enemy.hp -= pDmg;
            } else if (actionType === 'heavy_strike') {
                modifyHp(-2); let base = Math.floor(player.stats.vigor * 2.5) + wpnBonus; pDmg = Math.max(1, rollDamage(base));
                if (Math.random() * 100 < (player.stats.fortune * 5)) {
                    pDmg = Math.floor(pDmg * 1.5); logEntry += `<span style='color:var(--danger-red); font-weight:bold;'>CRITICAL HEAVY STRIKE!</span> Dealt <span class='dmg-dealt'>${pDmg} dmg</span>. `;
                } else { logEntry += `You sacrifice blood for a Heavy Strike! Dealt <span class='dmg-dealt'>${pDmg} dmg</span>. `; }
                player.combat.enemy.hp -= pDmg;
            } else if (actionType === 'mend') {
                modifyMana(-5); modifyHp(5); logEntry += `You weave a healing thread. <span class='dmg-dealt'>Recovered 5 HP!</span> `;
            } else if (actionType === 'shadow_strike') {
                modifyMana(-4); let base = (player.stats.resonance * 2) + (player.stats.agility * 2); pDmg = Math.max(1, rollDamage(base)); enemyDmg = 0; 
                logEntry += `You meld with the shadows and strike from behind! Dealt <span class='dmg-dealt'>${pDmg} dmg</span> and avoided all incoming damage! `;
                player.combat.enemy.hp -= pDmg;
            }

            // Check Enemy Death
            if (player.combat.enemy.hp <= 0) {
                logEntry += ` <br><br><b>${player.combat.enemy.name} is defeated!</b>`; player.combat.log.unshift(`<div class='combat-log-entry'>${logEntry}</div>`);
                addXp(player.combat.enemy.xp); player.combat.active = false; updateUI(); renderNode(player.combat.enemy.winTarget); return;
            }

            // Enemy Attack & Passive Dodge logic
            if (player.combat.enemy.hp > 0) {
                if (enemyStunnedThisTurn) {
                    logEntry += `<br>The enemy is <span style='color:var(--equip-green);'>STUNNED</span> and misses their turn!`;
                } else if (actionType !== 'shadow_strike' && actionType !== 'evade' && actionType !== 'parry' && actionType !== 'block') {
                    // Passive Evasion check if you didn't do a defensive move
                    let passiveDodge = (player.stats.agility * 5) + (player.stats.fortune * 2); 
                    if (Math.random() * 100 < passiveDodge) {
                        enemyDmg = 0; logEntry += `<br>You rely on your instincts and passively <span style='color:var(--equip-green);'>dodge</span> the attack!`;
                    }
                }

                if (enemyDmg > 0) { logEntry += `<br>The enemy attacks, dealing <span class='dmg-taken'>${enemyDmg} dmg</span>.`; modifyHp(-enemyDmg); } 
                else if (actionType === 'evade' && enemyDmg === 0) { logEntry += `<br>The enemy misses completely!`; }
                else if (actionType === 'block' && enemyDmg === 0) { logEntry += `<br>The enemy's attack clangs harmlessly off your guard!`; }
            }

            player.combat.log.unshift(`<div class='combat-log-entry'>${logEntry}</div>`);
            if (player.hp <= 0) { player.combat.active = false; updateUI(); renderNode("death"); return; }
            updateUI(); renderCombat();
        }

        function renderCombat() {
            const proseEl = document.getElementById('prose-container'); const choicesEl = document.getElementById('choices-container');
            let html = `<div class='enemy-header'>${player.combat.enemy.name}<br>HP: ${player.combat.enemy.hp} / ${player.combat.enemy.maxHp}</div>`;
            html += player.combat.log.join(""); proseEl.innerHTML = html; choicesEl.innerHTML = ''; 

            const btnStrike = document.createElement('button'); btnStrike.className = 'choice-btn'; btnStrike.innerHTML = `⚔️ Strike (Uses Vigor & Weapon)`; btnStrike.onclick = () => executeCombatRound('strike'); choicesEl.appendChild(btnStrike);
            
            const btnMagic = document.createElement('button'); btnMagic.className = 'choice-btn';
            let manaReq = player.stats.resonance > 0 ? "" : "<span class='req-text'>Requires Resonance Awakened</span>"; let manaCost = player.mana < 3 ? "<span class='req-text req-mana'>Not enough Mana (Needs 3)</span>" : "";
            btnMagic.innerHTML = `✨ Resonance Blast (Uses Resonance. Cost: 3 Mana) ${manaReq} ${manaCost}`; btnMagic.disabled = player.stats.resonance === 0 || player.mana < 3; btnMagic.onclick = () => executeCombatRound('magic'); choicesEl.appendChild(btnMagic);
            
            const btnEvade = document.createElement('button'); btnEvade.className = 'choice-btn'; btnEvade.innerHTML = `💨 Evade (High dodge chance, reduces damage on fail)`; btnEvade.onclick = () => executeCombatRound('evade'); choicesEl.appendChild(btnEvade);

            // DYNAMIC SKILLS & EQUIP ACTIONS
            if (player.equipment.accessory === "Iron Buckler") { const btnBlock = document.createElement('button'); btnBlock.className = 'choice-btn'; btnBlock.innerHTML = `🛡️ Block (Uses Vigor/Armor to absorb damage)`; btnBlock.onclick = () => executeCombatRound('block'); choicesEl.appendChild(btnBlock); }

            if (player.skills.includes("Parry")) { const btnParry = document.createElement('button'); btnParry.className = 'choice-btn'; btnParry.innerHTML = `⚔️ Parry (Agility check. Negates damage & Stuns. High damage on fail.)`; btnParry.onclick = () => executeCombatRound('parry'); choicesEl.appendChild(btnParry); }
            if (player.skills.includes("Reckless Counter")) { const btnTrade = document.createElement('button'); btnTrade.className = 'choice-btn'; btnTrade.innerHTML = `🩸 Reckless Counter (Take 1.5x damage to deal massive damage.)`; btnTrade.onclick = () => executeCombatRound('reckless_counter'); choicesEl.appendChild(btnTrade); }
            if (player.skills.includes("Staggering Blow")) { const btnStagger = document.createElement('button'); btnStagger.className = 'choice-btn'; let hpCost = player.hp <= 1 ? "<span class='req-text'>HP too low</span>" : ""; btnStagger.innerHTML = `👊 Staggering Blow (Low Dmg. Cost: 1 HP. Guarantees Stun.) ${hpCost}`; btnStagger.disabled = player.hp <= 1; btnStagger.onclick = () => executeCombatRound('staggering_blow'); choicesEl.appendChild(btnStagger); }
            if (player.skills.includes("Heavy Strike")) { const btnHeavy = document.createElement('button'); btnHeavy.className = 'choice-btn'; let hpCost = player.hp <= 2 ? "<span class='req-text'>HP too low (Needs > 2)</span>" : ""; btnHeavy.innerHTML = `💥 Heavy Strike (Massive Dmg. Cost: 2 HP) ${hpCost}`; btnHeavy.disabled = player.hp <= 2; btnHeavy.onclick = () => executeCombatRound('heavy_strike'); choicesEl.appendChild(btnHeavy); }
            if (player.skills.includes("Mend")) { const btnMend = document.createElement('button'); btnMend.className = 'choice-btn'; let mendManaCost = player.mana < 5 ? "<span class='req-text req-mana'>Not enough Mana (Needs 5)</span>" : ""; btnMend.innerHTML = `🌿 Mend (Heals 5 HP. Cost: 5 Mana) ${mendManaCost}`; btnMend.disabled = player.mana < 5; btnMend.onclick = () => executeCombatRound('mend'); choicesEl.appendChild(btnMend); }
            if (player.skills.includes("Shadow Strike")) { const btnShadow = document.createElement('button'); btnShadow.className = 'choice-btn'; let shadowManaCost = player.mana < 4 ? "<span class='req-text req-mana'>Not enough Mana (Needs 4)</span>" : ""; btnShadow.innerHTML = `🌘 Shadow Strike (Dmg + Guaranteed Dodge. Cost: 4 Mana) ${shadowManaCost}`; btnShadow.disabled = player.mana < 4; btnShadow.onclick = () => executeCombatRound('shadow_strike'); choicesEl.appendChild(btnShadow); }
        }

        // --- TRANSITION HANDLER ---
        function handleTransition(targetNode) {
            if (player.hp <= 0) { renderNode("death"); return; }
            if (player.level >= 10 && player.xp >= player.xpReq && targetNode !== "level_maxed") { postLevelUpTarget = targetNode; renderNode("level_maxed"); return; }
            if (player.xp >= player.xpReq && targetNode !== "level_up" && player.level < 10) { postLevelUpTarget = targetNode; renderNode("level_up"); return; }

            if (targetNode === "START_COMBAT_WOLF") { initCombat("timber_wolf"); return; }
            if (targetNode === "START_COMBAT_HOUND") { initCombat("crystal_hound"); return; }
            if (targetNode === "START_COMBAT_BOSS") { initCombat("fracture_sentinel"); return; }
            if (targetNode === "START_COMBAT_KAELEN") { initCombat("kaelen"); return; }
            if (targetNode === "START_COMBAT_CHAMPION") { initCombat("academy_champion"); return; }

            let eventChance = 0.05 + eventRateModifier - (player.stats.fortune * 0.005); 
            const excludeEvents = ["start", "death", "level_up", "level_maxed", "inventory_menu", "skill_tree_menu", "exam_pass", "dungeon_entrance", "dungeon_depths", "dungeon_victory", "combat_victory_kaelen", "combat_victory_champion", "confront_kaelen", "silent_choir_hideout", "slag_forge", "combat_victory_wolf", "ascension_end"];
            
            if (!excludeEvents.includes(targetNode) && !targetNode.startsWith("event_") && !targetNode.startsWith("combat_") && targetNode !== "RETURN_TO_HUB" && Math.random() < eventChance) {
                intendedTarget = targetNode; 
                if (eventRateModifier > 0 && Math.random() > 0.4) { initCombat("bandit"); } 
                else { renderNode("event_found_coin"); }
            } else { renderNode(targetNode); }
        }

        function renderNode(nodeId) {
            if (nodeId === "RETURN_FROM_EVENT") nodeId = intendedTarget;
            if (nodeId === "RETURN_FROM_LEVEL") { nodeId = postLevelUpTarget; if (player.hp <= 0) nodeId = "death"; }
            if (nodeId === "RETURN_TO_HUB") nodeId = previousHub;

            player.currentNode = nodeId; 
            const node = story[nodeId];
            const proseEl = document.getElementById('prose-container'); const choicesEl = document.getElementById('choices-container');

            proseEl.classList.remove('fade-in'); void proseEl.offsetWidth; proseEl.classList.add('fade-in');
            proseEl.innerHTML = node.text; choicesEl.innerHTML = '';

            let visibleChoices = node.choices.filter(c => true);

            if (nodeId === "village_square" && player.flags.includes("cleared_fracture")) { visibleChoices = visibleChoices.filter(c => c.target !== "dungeon_entrance"); }
            if (nodeId === "capital_slums" && player.flags.includes("joined_choir")) { visibleChoices = visibleChoices.filter(c => c.target !== "dark_alley"); }
            if (nodeId === "academy_hub" && player.flags.includes("defeated_kaelen")) { visibleChoices = visibleChoices.filter(c => c.target !== "confront_kaelen"); }
            if (nodeId === "academy_hub" && player.flags.includes("defeated_champion")) { visibleChoices = visibleChoices.filter(c => c.target !== "START_COMBAT_CHAMPION"); }

            visibleChoices.forEach(choice => {
                const btn = document.createElement('button'); btn.className = 'choice-btn'; let disabled = false; let reqText = '';
                
                if (choice.req) {
                    if (choice.req.type === "currency") { if (player.wealth < choice.req.val) { disabled = true; reqText = `<span class="req-text">Requires ${choice.req.val} cp</span>`; }
                    } else if (choice.req.type === "item") { if (!player.inventory.includes(choice.req.stat)) { disabled = true; reqText = `<span class="req-text">Requires Item: ${choice.req.stat}</span>`; }
                    } else if (choice.req.type === "flag") { if (!player.flags.includes(choice.req.stat)) { disabled = true; reqText = `<span class="req-text">${choice.req.text}</span>`; }
                    } else if (choice.req.type === "time") { if (player.time.month !== choice.req.month) { disabled = true; reqText = `<span class="req-text req-time">${choice.req.text}</span>`; }
                    } else if (choice.req.type === "skill_buy") {
                        if (player.sp < choice.req.cost) { disabled = true; reqText = `<span class="req-text req-sp">Requires ${choice.req.cost} SP</span>`; }
                        else if (player.skills.includes(choice.req.skill)) { disabled = true; reqText = `<span class="req-text">Already Learned</span>`; }
                        else if (player.stats[choice.req.stat] < choice.req.statVal) { disabled = true; reqText = `<span class="req-text">Requires ${choice.req.stat.charAt(0).toUpperCase() + choice.req.stat.slice(1)}: ${choice.req.statVal}</span>`; }
                    } else if (choice.req.type === "complex") {
                         if (player.stats[choice.req.stat1] < choice.req.val1 || player.stats[choice.req.stat2] < choice.req.val2) { disabled = true; reqText = `<span class="req-text">Requires ${choice.req.stat1.charAt(0).toUpperCase() + choice.req.stat1.slice(1)}: ${choice.req.val1} & ${choice.req.stat2.charAt(0).toUpperCase() + choice.req.stat2.slice(1)}: ${choice.req.val2}</span>`; }
                    } else if (choice.req.type === "craft") {
                        let missing = false; let reqList = ""; choice.req.items.forEach(reqItem => { if(!player.inventory.includes(reqItem)) missing = true; reqList += reqItem + ", "; });
                        if (missing) { disabled = true; reqText = `<span class="req-text">Requires: ${reqList.slice(0,-2)}</span>`; }
                    } else if (choice.req.type === "ascension") {
                        let hasFragments = player.inventory.includes("Loom Fragment: Resonance") && player.inventory.includes("Loom Fragment: Pride") && player.inventory.includes("Loom Fragment: Authority");
                        if (player.level < 10 || !hasFragments) { disabled = true; reqText = `<span class="req-text">Requires Level 10 and 3 Loom Fragments</span>`; }
                    } else { if (player.stats[choice.req.stat] < choice.req.val) { disabled = true; reqText = `<span class="req-text">Requires ${choice.req.stat.charAt(0).toUpperCase() + choice.req.stat.slice(1)}: ${choice.req.val}</span>`; } }
                }

                let hideChoice = false;
                if (choice.text.includes("Equip Iron Dagger") && player.equipment.weapon === "Iron Dagger") hideChoice = true;
                if (choice.text.includes("Equip Rune-Etched Blade") && player.equipment.weapon === "Rune-Etched Blade") hideChoice = true;
                if (choice.text.includes("Equip Traveler's Cloak") && player.equipment.armor === "Traveler's Cloak") hideChoice = true;
                if (choice.text.includes("Equip Hunter's Leather") && player.equipment.armor === "Hunter's Leather") hideChoice = true;
                if (choice.text.includes("Equip Iron Buckler") && player.equipment.accessory === "Iron Buckler") hideChoice = true;
                if (choice.text.includes("Equip Resonance Amulet") && player.equipment.accessory === "Resonance Amulet") hideChoice = true;
                if (choice.text.includes("Equip Vane Signet Ring") && player.equipment.accessory === "Vane Signet Ring") hideChoice = true;

                btn.innerHTML = choice.text + reqText; btn.disabled = disabled;
                if (!disabled) { btn.onclick = () => { if (choice.effect) choice.effect(); updateUI(); handleTransition(choice.target); }; }
                if (!hideChoice) { choicesEl.appendChild(btn); }
            });
        }

        updateUI(); renderNode('start');
    </script>
</body>
</html>
